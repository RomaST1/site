<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./css/style.css">
    <title>Контакти — Smart Home CRM</title>
</head>
<body>
    <nav class="nav">
        <a class="nav__logo" href="index.html">🏠 SmartCRM</a>
        <div class="nav__links">
    <a class="nav__link" href="index.html">Дашборд</a>
    <a class="nav__link" href="index.html">Пристрої</a>
    <a class="nav__link" href="users.html">Користувачі</a>
            <a class="nav__link nav__link--active" href="contacts.html">Контакти</a>
        </div>
                   <div class="user-menu">
      <button id="user-menu-btn" class="user-menu__btn">
          <span id="user-name-display">Завантаження...</span>
          <span class="user-menu__avatar">👤</span>
    </nav>

    <main class="page">
        <div class="page__header">
            <h1 class="page__title">Підтримка</h1>
            <p class="page__subtitle">Залиште запит щодо роботи системи розумного будинку</p>
        </div>

        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; margin-bottom: 30px;">
            <div class="card card--device">
                <div class="card__icon">📞</div>
                <h3 class="card__title">Гаряча лінія</h3>
                <p class="card__meta" style="margin-top: 10px;">+38 (099) 123-45-67</p>
                <div class="card__footer"><span class="badge badge--online">Пн-Пт: 09:00 - 18:00</span></div>
            </div>
            <div class="card card--device">
                <div class="card__icon">📍</div>
                <h3 class="card__title">Головний офіс</h3>
                <p class="card__meta" style="margin-top: 10px;">м. Івано-Франківськ</p>
                <p class="card__meta">вул. Карпатська, 15 (ІФНТУНГ)</p>
                <div class="card__footer"><span class="badge badge--role">Кафедра КСМ</span></div>
            </div>
        </div>

        <div class="form-card" style="max-width: 100%;">
            <h2>Надіслати повідомлення</h2>
            <form id="contact-form">
                <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 15px;">
                    <div class="form-group">
                        <label for="contact-name">Ваше ім'я</label>
                        <input id="contact-name" type="text" required placeholder="Ім'я та Прізвище">
                    </div>
                    <div class="form-group">
                        <label for="contact-subject">Тема звернення</label>
                        <select id="contact-subject" required>
                            <option value="">— Оберіть тему —</option>
                            <option value="Технічна помилка">Технічна помилка</option>
                            <option value="Проблема з пристроєм">Проблема з пристроєм</option>
                            <option value="Інше">Інше</option>
                        </select>
                    </div>
                </div>
                <div class="form-group">
                    <label for="contact-message">Повідомлення</label>
                    <textarea id="contact-message" class="form-input" required placeholder="Опишіть вашу проблему..." style="height: 100px; resize: vertical; width: 100%; font-family: inherit;"></textarea>
                </div>
                <button type="submit" class="btn btn--primary">Відправити запит</button>
            </form>
        </div>
    </main>

    <script type="module" src="./js/app.js"></script>
</body>
</html>
